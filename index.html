<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Clavier Morse</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --bg: #0a0a0f;
    --panel: #111118;
    --border: #2a2a3a;
    --dot: #00ff88;
    --dash: #00aaff;
    --accent: #ff6b35;
    --text: #e0e0e0;
    --muted: #555;
    --glow-dot: 0 0 12px #00ff8866;
    --glow-dash: 0 0 12px #00aaff66;
    --glow-accent: 0 0 12px #ff6b3566;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 12px 24px;
    gap: 16px;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  h1 {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--muted);
    z-index: 1;
    margin-top: 4px;
  }

  /* Output display */
  .display {
    width: 100%;
    max-width: 480px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    z-index: 1;
    position: relative;
    min-height: 90px;
  }

  .display-label {
    font-size: 9px;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .display-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 20px;
    color: var(--dot);
    word-break: break-all;
    min-height: 28px;
    line-height: 1.5;
    text-shadow: var(--glow-dot);
  }

  /* Current letter being typed */
  .current-letter {
    display: inline;
    color: var(--accent);
    text-shadow: var(--glow-accent);
    animation: blink 1s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Legend */
  .legend {
    font-size: 10px;
    color: var(--muted);
    margin-top: 8px;
    line-height: 1.8;
  }
  .legend span { color: var(--text); }

  /* Action buttons row */
  .actions {
    display: flex;
    gap: 8px;
    width: 100%;
    max-width: 480px;
    z-index: 1;
  }

  .btn-action {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .btn-action:active, .btn-action.flash {
    background: #1a1a2a;
    color: var(--text);
    border-color: var(--dot);
    box-shadow: var(--glow-dot);
  }

  /* Keyboard grid */
  .keyboard {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 1;
  }

  .row {
    display: flex;
    gap: 10px;
  }

  .key {
    flex: 1;
    aspect-ratio: 1.2;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--panel);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.08s, box-shadow 0.08s, background 0.08s;
    user-select: none;
    position: relative;
    overflow: hidden;
  }

  .key::after {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.3s;
    border-radius: inherit;
  }

  .key:active { transform: scale(0.93); }

  .key.dot-type { border-color: #00ff8833; }
  .key.dot-type:active, .key.dot-type.flash {
    background: #00ff8812;
    box-shadow: var(--glow-dot), inset 0 0 20px #00ff8808;
    border-color: var(--dot);
  }

  .key.dash-type { border-color: #00aaff33; }
  .key.dash-type:active, .key.dash-type.flash {
    background: #00aaff12;
    box-shadow: var(--glow-dash), inset 0 0 20px #00aaff08;
    border-color: var(--dash);
  }

  .key-symbol {
    font-family: 'Share Tech Mono', monospace;
    font-size: 22px;
    line-height: 1;
    pointer-events: none;
  }

  .key.dot-type .key-symbol { color: var(--dot); text-shadow: var(--glow-dot); }
  .key.dash-type .key-symbol { color: var(--dash); text-shadow: var(--glow-dash); }

  .key-label {
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--muted);
    margin-top: 4px;
    pointer-events: none;
  }

  /* Space key */
  .key-space {
    flex: 2.5;
    aspect-ratio: auto;
    height: 56px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--panel);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    gap: 8px;
    transition: transform 0.08s, box-shadow 0.08s, background 0.08s;
    user-select: none;
  }

  .key-space:active, .key-space.flash {
    background: #ffffff08;
    box-shadow: 0 0 12px #ffffff22;
    border-color: #ffffff44;
    transform: scale(0.97);
  }

  .key-space .key-symbol { color: var(--text); font-size: 16px; }
  .key-space .key-label { color: var(--muted); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; }

  /* Backspace */
  .key-back {
    flex: 1;
    height: 56px;
    border-radius: 10px;
    border: 1px solid #ff000033;
    background: var(--panel);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.08s;
    user-select: none;
  }

  .key-back:active, .key-back.flash {
    background: #ff000012;
    box-shadow: 0 0 12px #ff000044;
    border-color: #ff4444;
  }

  .key-back .key-symbol { color: #ff4444; font-size: 18px; text-shadow: 0 0 8px #ff444466; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--dot);
    color: #000;
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    padding: 10px 20px;
    border-radius: 20px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 100;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<h1>⬛ Clavier Morse ⬛</h1>

<div class="display">
  <div class="display-label">▸ Message encodé</div>
  <div class="display-text" id="output"><span class="current-letter" id="current"></span></div>
  <div class="legend">
    <span>Espace</span> → ferme la lettre <span>[  ]</span> &nbsp;|&nbsp;
    <span>2× Espace</span> → mot <span>;</span>
  </div>
</div>

<div class="actions">
  <button class="btn-action" onclick="copyText()">⎘ Copier</button>
  <button class="btn-action" onclick="clearAll()">⌧ Effacer tout</button>
</div>

<div class="keyboard">

  <!-- Rangée 1 : . et _ -->
  <div class="row">
    <div class="key dot-type" onclick="tap('.')">
      <div class="key-symbol">•</div>
      <div class="key-label">point</div>
    </div>
    <div class="key dot-type" onclick="tap('..')">
      <div class="key-symbol">••</div>
      <div class="key-label">double point</div>
    </div>
    <div class="key dash-type" onclick="tap('_')">
      <div class="key-symbol">—</div>
      <div class="key-label">tiret</div>
    </div>
    <div class="key dash-type" onclick="tap('__')">
      <div class="key-symbol">——</div>
      <div class="key-label">double tiret</div>
    </div>
  </div>

  <!-- Rangée 2 : Espace + Backspace -->
  <div class="row">
    <div class="key-space" onclick="tapSpace()" id="spaceKey">
      <div class="key-symbol">␣</div>
      <div class="key-label">espace / lettre</div>
    </div>
    <div class="key-back" onclick="tapBack()">
      <div class="key-symbol">⌫</div>
    </div>
  </div>

</div>

<div class="toast" id="toast">COPIÉ !</div>

<script>
  let committed = '';   // texte validé (lettres entre crochets)
  let current = '';     // lettre en cours de frappe
  let lastSpaceTime = 0;
  let spaceTimer = null;

  function render() {
    const outEl = document.getElementById('output');
    const curEl = document.getElementById('current');
    let curDisplay = current ? '[' + current : '';
    outEl.innerHTML = committed + '<span class="current-letter">' + curDisplay + '</span>';
  }

  function tap(symbol) {
    current += symbol;
    flash(event && event.currentTarget);
    render();
  }

  function tapSpace() {
    const now = Date.now();
    flash(document.getElementById('spaceKey'));

    if (now - lastSpaceTime < 400) {
      // Double espace → séparateur de mot ;
      clearTimeout(spaceTimer);
      // Ferme la lettre en cours si besoin
      if (current) {
        committed += '[' + current + ']';
        current = '';
      }
      // Supprime le ][ de séparation de lettre ajouté par le premier espace si présent
      if (committed.endsWith('][')) {
        committed = committed.slice(0, -2);
      }
      committed += ';';
      lastSpaceTime = 0;
      render();
      return;
    }

    lastSpaceTime = now;

    spaceTimer = setTimeout(() => {
      // Simple espace → valider la lettre en cours
      if (current) {
        committed += '[' + current + ']';
        // Ajoute ][ comme séparateur prêt pour la prochaine lettre
        committed += '[';
        current = '';
        // On va afficher [ ouvert dans le current
        // En fait on retire le [ qu'on vient d'ajouter et on le met dans current
        committed = committed.slice(0, -1);
        render();
      }
    }, 200);
  }

  function tapBack() {
    flash(document.querySelector('.key-back'));
    if (current.length > 0) {
      // Retire le dernier symbole de la lettre en cours
      // Les symboles peuvent être .. ou __ (2 chars) ou . _ (1 char)
      if (current.endsWith('..') || current.endsWith('__')) {
        current = current.slice(0, -2);
      } else {
        current = current.slice(0, -1);
      }
    } else if (committed.length > 0) {
      // Retire le dernier caractère du texte validé
      committed = committed.slice(0, -1);
    }
    render();
  }

  function clearAll() {
    committed = '';
    current = '';
    render();
  }

  function copyText() {
    let fullText = committed;
    if (current) fullText += '[' + current + ']';
    if (!fullText) return;
    navigator.clipboard.writeText(fullText).then(() => {
      showToast('COPIÉ !');
    }).catch(() => {
      // Fallback
      const ta = document.createElement('textarea');
      ta.value = fullText;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('COPIÉ !');
    });
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  }

  function flash(el) {
    if (!el) return;
    el.classList.add('flash');
    setTimeout(() => el.classList.remove('flash'), 150);
  }

  // Permettre le tap via event sur les .key
  document.querySelectorAll('.key').forEach(k => {
    k.addEventListener('click', function(e) {
      flash(this);
    });
  });

  render();
</script>
</body>
</html>
